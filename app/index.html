<!doctype html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&family=Cairo:wght@200..1000&family=Inter:wght@100..900&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Lexend:wght@100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#050505">
  <title>Academy System</title>
  <script>
    // Immediate theme application to prevent flash of default colors on refresh
    (function () {
      try {
        const saved = localStorage.getItem('gym_settings');
        if (!saved) return;
        const s = JSON.parse(saved);

        if (s.academy_name) document.title = s.academy_name;

        const root = document.documentElement;
        if (s.primary_color) root.style.setProperty('--color-primary', s.primary_color);
        if (s.secondary_color) {
          root.style.setProperty('--color-secondary', s.secondary_color);
          root.style.setProperty('--color-background', s.secondary_color);

          // Fast luminance check for text colors
          const hex = s.secondary_color;
          if (typeof hex === 'string' && hex.startsWith('#')) {
            const c = hex.substring(1);
            const rgb = parseInt(c.length === 3 ? c[0] + c[0] + c[1] + c[1] + c[2] + c[2] : c, 16);
            const r = (rgb >> 16) & 0xff;
            const g = (rgb >> 8) & 0xff;
            const b = (rgb >> 0) & 0xff;
            const lum = 0.2126 * (r / 255) + 0.7152 * (g / 255) + 0.0722 * (b / 255);
            if (lum > 0.6) {
              root.style.setProperty('--color-text-base', s.text_color_base || '#0a0a0f');
              root.style.setProperty('--color-text-muted', s.text_color_muted || '#475569');
              root.style.setProperty('--is-light-mode', '1');
            } else {
              root.style.setProperty('--color-text-base', s.text_color_base || '#f8fafc');
              root.style.setProperty('--color-text-muted', s.text_color_muted || 'rgba(255, 255, 255, 0.6)');
              root.style.setProperty('--is-light-mode', '0');
            }
          }
        }
        if (s.accent_color) root.style.setProperty('--color-accent', s.accent_color);
        if (s.surface_color) root.style.setProperty('--color-surface', s.surface_color);
        if (s.input_bg_color) root.style.setProperty('--color-input-bg', s.input_bg_color);
        if (s.font_family && s.font_family !== 'Cairo') root.style.setProperty('font-family', '"' + s.font_family + '", sans-serif');
        if (s.font_scale) root.style.setProperty('font-size', (s.font_scale * 100) + '%');
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
