<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Scooter Dashboard Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
    
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      /* Android Home Screen Wallpaper Simulation */
      background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .title-banner {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      margin-bottom: 40px;
      font-weight: 800;
      letter-spacing: 1px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* ──── WIDGET CONTAINER (Mimics the Main App Card) ──── */
    .widget-container {
      width: 200px; /* Slightly wider for all info */
      height: 200px;
      border-radius: 28px;
      background: rgba(20, 20, 24, 0.45);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 15px rgba(255, 255, 255, 0.03);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 18px;
      box-sizing: border-box;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }

    .widget-container::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: #00f0ff;
      filter: blur(40px);
      opacity: 0.12;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    /* ──── TOP ROW: OIL BADGE & GPS ──── */
    .top-row {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      z-index: 2;
    }

    .oil-pill {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 3px 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .oil-dot {
      width: 6px;
      height: 6px;
      background: #00f0ff;
      border-radius: 50%;
      box-shadow: 0 0 5px #00f0ff;
    }

    .oil-text {
      color: #fff;
      font-size: 8px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .gps-dot {
      width: 6px;
      height: 6px;
      background: #00f064;
      border-radius: 50%;
      box-shadow: 0 0 8px #00f064;
      animation: pulse 2s infinite;
      margin-top: 4px;
    }

    /* ──── SPEED ARC (SVG) & CENTER SPEED ──── */
    .speed-section {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      z-index: 2;
    }

    .speed-svg {
      width: 120px;
      height: 60px;
      overflow: visible;
    }

    .speed-arc-bg {
      fill: none;
      stroke: rgba(255,255,255,0.08);
      stroke-width: 5;
      stroke-linecap: round;
    }

    .speed-arc-fill {
      fill: none;
      stroke: #00f0ff;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 125.6; /* Approx circumference math */
      stroke-dashoffset: 60; /* Adjusted dynamically */
      transition: stroke-dashoffset 0.5s ease-out;
    }

    .speed-center-text {
      position: absolute;
      bottom: -6px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .speed-value {
      font-size: 32px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 10px rgba(0, 240, 255, 0.3);
      font-variant-numeric: tabular-nums;
    }

    .speed-unit {
      font-size: 8px;
      font-weight: 800;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ──── BOTTOM ROW: RANGE & FUEL ──── */
    .bottom-row {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      gap: 5px;
    }

    .range-label {
      font-size: 7px;
      font-weight: 800;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .range-value {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .fuel-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 2px;
    }

    .fuel-bar-fill {
      height: 100%;
      width: 65%;
      background: linear-gradient(90deg, #00f0ff, #0088ff);
      border-radius: 4px;
      box-shadow: 0 0 5px #00f0ff;
    }

    .fuel-stats {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 8px;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); box-shadow: 0 0 15px #00f064; }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="title-banner">
    Mini Dashboard Widget Preview
  </div>

  <div class="widget-container">
    
    <!-- Top Row: Oil + GPS -->
    <div class="top-row">
      <div class="oil-pill">
        <div class="oil-dot"></div>
        <div class="oil-text">OIL: 420 KM</div>
      </div>
      <div class="gps-dot"></div>
    </div>

    <!-- Middle: Speed Arc -->
    <div class="speed-section">
      <svg class="speed-svg" viewBox="0 0 100 50">
        <!-- R = 40, Center = (50, 45) -->
        <path class="speed-arc-bg" d="M 10,45 A 40,40 0 0,1 90,45" />
        <path class="speed-arc-fill" id="speedArc" d="M 10,45 A 40,40 0 0,1 90,45" />
      </svg>
      <div class="speed-center-text">
        <div class="speed-value" id="speedDisplay">45</div>
        <div class="speed-unit">KM/H</div>
      </div>
    </div>

    <!-- Bottom: Range & Fuel -->
    <div class="bottom-row">
      <div class="range-label">ESTIMATED RANGE</div>
      <div class="range-value">85.4 <span style="font-size: 10px; color:rgba(255,255,255,0.6)">KM</span></div>
      
      <div class="fuel-bar-bg">
        <div class="fuel-bar-fill"></div>
      </div>
      
      <div class="fuel-stats">
        <span>💧 2.1 L</span>
        <span>EMPTY: 1024 KM</span>
      </div>
    </div>

  </div>

  <script>
    let speed = 0;
    let targetSpeed = 45;
    
    // Exact circumference of a half-circle with R=40 is ~125.6
    const arcLength = 125.6; 
    const MAX_SPEED = 120;

    setInterval(() => {
      speed += (targetSpeed - speed) * 0.1;
      document.getElementById('speedDisplay').textContent = Math.round(speed);
      
      // Arc logic
      // When speed=0, offset=arcLength. When speed=MAX, offset=0
      let frac = Math.min(speed, MAX_SPEED) / MAX_SPEED;
      let offset = arcLength - (frac * arcLength);
      document.getElementById('speedArc').style.strokeDasharray = arcLength;
      document.getElementById('speedArc').style.strokeDashoffset = offset;

      if(Math.random() > 0.95) {
        targetSpeed = Math.floor(Math.random() * 30) + 30; 
      }
    }, 100);
  </script>
</body>
</html>
