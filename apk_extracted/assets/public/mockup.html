<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Red Action Mockup</title>
    <style>
        body {
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .phone {
            width: 360px;
            height: 640px;
            background: #121212;
            border-radius: 40px;
            position: relative;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .header {
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .notification-container {
            width: 100%;
            animation: slideDown 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .notification {
            background: #2c2c2e;
            border-radius: 20px;
            padding: 16px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .top-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .icon-box {
            background: #1c1c1e;
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }
        .title {
            font-weight: 700;
            margin-bottom: 2px;
            color: #ff453a;
            font-size: 15px;
        }
        .body-text {
            font-size: 13px;
            color: #ebebf5;
            line-height: 1.4;
            opacity: 0.8;
        }
        .action-bar {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 12px;
            padding-top: 12px;
            display: flex;
            gap: 12px;
        }
        .action-button-red {
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            padding: 8px 20px;
            border-radius: 10px;
            background: rgba(255, 69, 58, 0.2);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 69, 58, 0.4);
            display: flex;
            align-items: center;
            gap: 6px;
            text-shadow: 0 0 10px rgba(255, 69, 58, 0.5);
        }
        .action-button-plain {
            color: rgba(255,255,255,0.5);
            font-weight: 600;
            font-size: 13px;
            background: transparent;
            border: none;
            padding: 8px;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <span>21:26</span>
            <div style="display: flex; gap: 8px;">📶 🔋</div>
        </div>
        <div class="notification-container">
            <div class="notification">
                <div class="top-row">
                    <div class="icon-box">🛵</div>
                    <div style="flex: 1;">
                        <div class="title">تحذير بنزين منخفض! ⚠️</div>
                        <div class="body-text">باقي لك 15 كيلو بس والبنزين يخلص، خلي بالك!</div>
                    </div>
                </div>
                <div class="action-bar">
                    <button class="action-button-red">إيقاف 🔇</button>
                    <button class="action-button-plain">تجاهل</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
